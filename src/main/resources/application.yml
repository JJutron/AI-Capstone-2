spring:
  application.name: vegin
  profiles:
    default: local

---
spring:
  config.activate.on-profile: local
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vegin?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
#    url: jdbc:mysql://localhost:3306/vegin?serverTimezone=UTC&characterEncoding=UTF-8
    username: vegin
    password: veginpass
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate : false
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 20MB     # 파일 하나당 최대 20MB
      max-request-size: 20MB  # 요청 전체 최대 20MB
server:
  port: 8080

jwt:
  secret: "veginSuperSecretKey1234567890!@#"
  expiration: 3600000  # 1시간

cloud:
  aws:
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    s3:
      bucket: vegin-media-submit # <- s3보다 더 들여쓰기 (공백 2칸 또는 4칸)
      region: ap-northeast-2    # <- s3보다 더 들여쓰기
    stack:
      auto: false

ai:
  fastapi:
    base-url: http://52.78.47.96:8000